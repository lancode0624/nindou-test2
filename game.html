<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nindou 2 Offline Prototype</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="room-mode">
  <main class="app">
    <section class="stage">
      <section id="roomScreen" class="room-screen" aria-label="房間畫面">
        <div class="room-frame">
          <header class="room-topbar">
            <button id="ruleModeToggle" type="button" class="room-rule-toggle" aria-pressed="false" aria-label="忍2原版">
              <span class="room-rule-checkbox">
                <img class="room-rule-checkbox-base" src="assets/room-candidates/waiting_room/checkbox.png" alt="">
                <img id="ruleModeCheckbox" class="room-rule-checkbox-check" src="assets/room-candidates/waiting_room/checkbox_checked.png" alt="">
              </span>
              <span>忍2原版</span>
            </button>
            <div class="room-title-cell"><span>模式</span><strong>拯救公主</strong></div>
            <button type="button" class="room-leave-btn" aria-label="離開"></button>
          </header>

          <aside class="team-tabs" aria-label="隊伍">
            <div class="team-tab active">青組</div>
            <div class="team-tab">灰組</div>
          </aside>

          <div class="player-grid" aria-label="玩家卡片">
            <article class="room-player-card host blue active-slot" data-team="blue" data-slot="1">
              <button type="button" class="room-slot-remove" aria-label="刪除">×</button>
              <button type="button" class="room-slot-add" aria-label="新增">新增</button>
              <div class="room-name">blue1</div>
              <img class="room-avatar" src="assets/room-ui-selected/b_team.png" alt="">
              <img class="room-avatar-eye" src="assets/ninja-composite-parts/eyes-middle/11.png" alt="">
              <div class="room-level"></div>
              <img class="room-owner" src="assets/room-ui-selected/room_owner.png" alt="室長">
              <input class="room-hp-input" data-team="blue" data-slot="1" type="number" min="1" max="9999" step="1" value="300" aria-label="Blue 1 血量">
              <select class="room-control-select" data-team="blue" data-slot="1" aria-label="Blue 1 控制">
                <option value="player" selected>玩家</option>
                <option value="ai_beginner">初心者</option>
                <option value="ai_money_dart_master">錢鏢神人</option>
              </select>
              <select class="room-weapon-select" data-team="blue" data-slot="1" aria-label="Blue 1 武器">
                <option value="weapon1" selected>苦無</option>
                <option value="weapon3">忍太刀</option>
                <option value="weapon4">伊賀密刀</option>
                <option value="weapon6">鐵扇不知火</option>
              </select>
            </article>
            <article class="room-player-card blue" data-team="blue" data-slot="2">
              <button type="button" class="room-slot-remove" aria-label="刪除">×</button>
              <button type="button" class="room-slot-add" aria-label="新增">新增</button>
              <div class="room-name">blue2</div>
              <img class="room-avatar" src="assets/room-ui-selected/b_team.png" alt="">
              <img class="room-avatar-eye" src="assets/ninja-composite-parts/eyes-middle/11.png" alt="">
              <div class="room-level">99段　身份: 疾風大將</div>
              <img class="room-ready" src="assets/room-ui-selected/player_not_ready.png" alt="未準備">
              <input class="room-hp-input" data-team="blue" data-slot="2" type="number" min="1" max="9999" step="1" value="300" aria-label="Blue 2 血量">
              <select class="room-control-select" data-team="blue" data-slot="2" aria-label="Blue 2 控制"></select>
              <select class="room-weapon-select" data-team="blue" data-slot="2" aria-label="Blue 2 武器"></select>
            </article>
            <article class="room-player-card blue" data-team="blue" data-slot="3">
              <button type="button" class="room-slot-remove" aria-label="刪除">×</button>
              <button type="button" class="room-slot-add" aria-label="新增">新增</button>
              <div class="room-name">blue3</div>
              <img class="room-avatar" src="assets/room-ui-selected/b_team.png" alt="">
              <img class="room-avatar-eye" src="assets/ninja-composite-parts/eyes-middle/11.png" alt="">
              <div class="room-level">99段　身份: 下忍</div>
              <img class="room-ready" src="assets/room-ui-selected/player_not_ready.png" alt="未準備">
              <input class="room-hp-input" data-team="blue" data-slot="3" type="number" min="1" max="9999" step="1" value="300" aria-label="Blue 3 血量">
              <select class="room-control-select" data-team="blue" data-slot="3" aria-label="Blue 3 控制"></select>
              <select class="room-weapon-select" data-team="blue" data-slot="3" aria-label="Blue 3 武器"></select>
            </article>
            <article class="room-player-card blue" data-team="blue" data-slot="4">
              <button type="button" class="room-slot-remove" aria-label="刪除">×</button>
              <button type="button" class="room-slot-add" aria-label="新增">新增</button>
              <div class="room-name">blue4</div>
              <img class="room-avatar" src="assets/room-ui-selected/b_team.png" alt="">
              <img class="room-avatar-eye" src="assets/ninja-composite-parts/eyes-middle/11.png" alt="">
              <div class="room-level">20段　身份: 初心者</div>
              <img class="room-ready" src="assets/room-ui-selected/player_not_ready.png" alt="未準備">
              <input class="room-hp-input" data-team="blue" data-slot="4" type="number" min="1" max="9999" step="1" value="300" aria-label="Blue 4 血量">
              <select class="room-control-select" data-team="blue" data-slot="4" aria-label="Blue 4 控制"></select>
              <select class="room-weapon-select" data-team="blue" data-slot="4" aria-label="Blue 4 武器"></select>
            </article>
            <article class="room-player-card grey active-slot" data-team="grey" data-slot="1">
              <button type="button" class="room-slot-remove" aria-label="刪除">×</button>
              <button type="button" class="room-slot-add" aria-label="新增">新增</button>
              <div class="room-name">grey1</div>
              <img class="room-avatar" src="assets/room-ui-selected/g_team.png" alt="">
              <img class="room-avatar-eye" src="assets/ninja-composite-parts/eyes-middle/11.png" alt="">
              <div class="room-level"></div>
              <img class="room-ready" src="assets/room-ui-selected/player_not_ready.png" alt="未準備">
              <input class="room-hp-input" data-team="grey" data-slot="1" type="number" min="1" max="9999" step="1" value="300" aria-label="Grey 1 血量">
              <select class="room-control-select" data-team="grey" data-slot="1" aria-label="Grey 1 控制"></select>
              <select class="room-weapon-select" data-team="grey" data-slot="1" aria-label="Grey 1 武器"></select>
            </article>
            <article class="room-player-card grey" data-team="grey" data-slot="2">
              <button type="button" class="room-slot-remove" aria-label="刪除">×</button>
              <button type="button" class="room-slot-add" aria-label="新增">新增</button>
              <div class="room-name">grey2</div>
              <img class="room-avatar" src="assets/room-ui-selected/g_team.png" alt="">
              <img class="room-avatar-eye" src="assets/ninja-composite-parts/eyes-middle/11.png" alt="">
              <div class="room-level">22段　身份: 中忍</div>
              <img class="room-ready" src="assets/room-ui-selected/player_not_ready.png" alt="未準備">
              <input class="room-hp-input" data-team="grey" data-slot="2" type="number" min="1" max="9999" step="1" value="300" aria-label="Grey 2 血量">
              <select class="room-control-select" data-team="grey" data-slot="2" aria-label="Grey 2 控制"></select>
              <select class="room-weapon-select" data-team="grey" data-slot="2" aria-label="Grey 2 武器"></select>
            </article>
            <article class="room-player-card grey" data-team="grey" data-slot="3">
              <button type="button" class="room-slot-remove" aria-label="刪除">×</button>
              <button type="button" class="room-slot-add" aria-label="新增">新增</button>
              <div class="room-name">grey3</div>
              <img class="room-avatar" src="assets/room-ui-selected/g_team.png" alt="">
              <img class="room-avatar-eye" src="assets/ninja-composite-parts/eyes-middle/11.png" alt="">
              <div class="room-level">18段　身份: 中忍</div>
              <img class="room-ready" src="assets/room-ui-selected/player_not_ready.png" alt="未準備">
              <input class="room-hp-input" data-team="grey" data-slot="3" type="number" min="1" max="9999" step="1" value="300" aria-label="Grey 3 血量">
              <select class="room-control-select" data-team="grey" data-slot="3" aria-label="Grey 3 控制"></select>
              <select class="room-weapon-select" data-team="grey" data-slot="3" aria-label="Grey 3 武器"></select>
            </article>
            <article class="room-player-card grey" data-team="grey" data-slot="4">
              <button type="button" class="room-slot-remove" aria-label="刪除">×</button>
              <button type="button" class="room-slot-add" aria-label="新增">新增</button>
              <div class="room-name">grey4</div>
              <img class="room-avatar" src="assets/room-ui-selected/g_team.png" alt="">
              <img class="room-avatar-eye" src="assets/ninja-composite-parts/eyes-middle/11.png" alt="">
              <div class="room-level">23段　身份: 上忍</div>
              <img class="room-ready" src="assets/room-ui-selected/player_not_ready.png" alt="未準備">
              <input class="room-hp-input" data-team="grey" data-slot="4" type="number" min="1" max="9999" step="1" value="300" aria-label="Grey 4 血量">
              <select class="room-control-select" data-team="grey" data-slot="4" aria-label="Grey 4 控制"></select>
              <select class="room-weapon-select" data-team="grey" data-slot="4" aria-label="Grey 4 武器"></select>
            </article>
          </div>

          <button id="battleStartBtn" type="button" class="battle-start-btn" aria-label="戰鬥開始">
            <img src="assets/room-ui-selected/start_button.png" alt="戰鬥開始">
          </button>

          <section class="chat-panel" aria-label="聊天">
            <div class="chat-log">
              <p>[番長] madcat: 0.0</p>
              <p>[副會長] 皇天不負工具人: 安安</p>
              <p>忍2大力三12: @@</p>
              <p>皇天不負工具人: 竟然抽的到國崩XD</p>
            </div>
            <div class="chat-input"><span>一般</span><strong></strong><button type="button">送</button></div>
          </section>

          <section class="mode-panel" aria-label="模式">
            <div class="mode-title">隨機忍二系列</div>
            <div class="mode-preview">?</div>
            <button type="button" class="mode-side side-a">編輯設定</button>
            <button type="button" class="mode-side side-b">遊戲設定</button>
          </section>

          <section class="room-volume-panel" aria-label="音量">
            <label class="room-volume-control">
              <input id="musicVolume" type="range" min="0" max="100" value="45" orient="vertical">
              <span>音樂</span>
            </label>
            <label class="room-volume-control">
              <input id="sfxVolume" type="range" min="0" max="100" value="80" orient="vertical">
              <span>音效</span>
            </label>
          </section>
        </div>
      </section>
      <canvas id="game" width="960" height="680" aria-label="Nindou 2 offline grid battle"></canvas>
      <div class="hud">
        <div id="unitInfo" class="unit-info"></div>
        <div class="meter" aria-hidden="true"><i id="skillFill"></i></div>
        <button id="resetBtn" type="button" aria-label="Reset">Reset</button>
      </div>
      <p id="status" class="sr-only">Ready</p>
    </section>
  </main>
  <script src="scripts/data/config.js"></script>
  <script src="scripts/data/weapons.js"></script>
  <script src="scripts/data/assets.js"></script>
  <script src="scripts/data/rule-modes.js"></script>
  <script src="scripts/systems/grid.js"></script>
  <script src="scripts/data/map.js"></script>
  <script src="scripts/systems/state-helpers.js"></script>
  <script src="scripts/systems/ninjutsu.js"></script>
  <script src="scripts/systems/combat.js"></script>
  <script src="scripts/systems/movement.js"></script>
  <script src="scripts/systems/ai.js"></script>
  <script src="scripts/systems/match.js"></script>
  <script src="game.js"></script>
</body>
</html>
